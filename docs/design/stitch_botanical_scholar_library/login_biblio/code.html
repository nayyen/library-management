<body class="botanical-bg min-h-screen flex flex-col justify-center items-center p-margin-mobile md:p-margin-desktop text-on-surface">
<main class="w-full max-w-md">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<span class="material-symbols-outlined text-6xl text-primary mb-2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                menu_book
            </span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Biblio</h1>
<p class="font-body-md text-body-md text-secondary mt-1">Sistem Manajemen Perpustakaan</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-paper-shadow rounded-xl p-6 md:p-8 shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] relative overflow-hidden">
<!-- Spine decoration -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-antique-gold/20"></div>
<h2 class="font-headline-md text-headline-md text-primary mb-6 text-center">Masuk ke Akun Anda</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Institusi</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline-variant pl-3">mail</span>
<input class="w-full bg-transparent border-0 border-b border-paper-shadow pl-10 py-2 focus:ring-0 focus:border-antique-gold transition-colors font-body-md text-body-md placeholder-outline-variant" id="email" name="email" placeholder="nama@institusi.ac.id" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="kata_sandi">Kata Sandi</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline-variant pl-3">lock</span>
<input class="w-full bg-transparent border-0 border-b border-paper-shadow pl-10 py-2 focus:ring-0 focus:border-antique-gold transition-colors font-body-md text-body-md placeholder-outline-variant" id="kata_sandi" name="kata_sandi" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Role Selector -->
<div class="space-y-2 pt-2">
<label class="font-label-md text-label-md text-on-surface-variant block mb-3">Masuk Sebagai</label>
<div class="flex gap-4">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="peran" type="radio" value="mahasiswa"/>
<div class="text-center py-2 px-4 border border-paper-shadow rounded-lg peer-checked:border-antique-gold peer-checked:bg-antique-gold/10 peer-checked:text-antique-gold transition-all">
<span class="font-label-sm text-label-sm">Mahasiswa</span>
</div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="peran" type="radio" value="pustakawan"/>
<div class="text-center py-2 px-4 border border-paper-shadow rounded-lg peer-checked:border-antique-gold peer-checked:bg-antique-gold/10 peer-checked:text-antique-gold transition-all">
<span class="font-label-sm text-label-sm">Pustakawan</span>
</div>
</label>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 rounded-lg hover:bg-primary/90 transition-colors mt-8 shadow-sm" type="submit">
                    Masuk
                </button>
</form>
<div class="mt-6 text-center">
<p class="font-body-sm text-body-sm text-secondary">
                    Belum memiliki akun? <a class="text-antique-gold hover:underline font-medium" href="#">Daftar sekarang</a>
</p>
</div>
</div>
</main>
